<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#0a0e1a"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Game controller icon -->
  <g transform="translate(128, 128)">
    <!-- Controller body -->
    <ellipse cx="0" cy="10" rx="90" ry="60" fill="url(#grad1)"/>
    
    <!-- D-pad -->
    <g transform="translate(-50, 5)">
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#0a0e1a"/>
      <rect x="-4" y="-12" width="8" height="24" rx="2" fill="#0a0e1a"/>
      <rect x="-12" y="-4" width="24" height="8" rx="2" fill="#0a0e1a"/>
    </g>
    
    <!-- Buttons -->
    <circle cx="50" cy="-10" r="8" fill="#0a0e1a"/>
    <circle cx="70" cy="10" r="8" fill="#0a0e1a"/>
    <circle cx="30" cy="10" r="8" fill="#0a0e1a"/>
    <circle cx="50" cy="30" r="8" fill="#0a0e1a"/>
    
    <!-- Center buttons -->
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#0a0e1a" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="128" y="230" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0f6fc" text-anchor="middle">GAME LIBRARY</text>
</svg>
